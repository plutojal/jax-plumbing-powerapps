name: Build Power Apps Import Packages

on:
  push:
    branches: [main]
    paths:
      - "apps/*/src/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build appointment-app import zip
        run: |
          APP=apps/appointment-app
          APP_ID=$(ls $APP/export/apps/)
          MSAPP_FILENAME=$(ls $APP/export/apps/$APP_ID/N*-document.msapp | xargs basename)
          TMPDIR=$(mktemp -d)

          # Repack src/ into .msapp
          cd $APP/src
          zip -r $TMPDIR/document.msapp . 2>/dev/null
          cd -

          # Build correct Power Apps import structure
          mkdir -p $TMPDIR/pkg/Microsoft.PowerApps/apps/$APP_ID
          cp $APP/export/manifest.json $TMPDIR/pkg/
          cp $APP/export/apps/$APP_ID/*.json $TMPDIR/pkg/Microsoft.PowerApps/apps/$APP_ID/
          cp $APP/export/apps/$APP_ID/*-logoSmallFile $TMPDIR/pkg/Microsoft.PowerApps/apps/$APP_ID/ 2>/dev/null || true
          cp $TMPDIR/document.msapp $TMPDIR/pkg/Microsoft.PowerApps/apps/$APP_ID/$MSAPP_FILENAME

          # Build the import zip fresh
          rm -f $APP/build/AppointmentApp_import.zip
          cd $TMPDIR/pkg
          zip -r $GITHUB_WORKSPACE/$APP/build/AppointmentApp_import.zip .
          rm -rf $TMPDIR

      - name: Commit updated import zip
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/appointment-app/build/AppointmentApp_import.zip
          git diff --cached --quiet || git commit -m "chore: rebuild AppointmentApp import zip [skip ci]"
          git push
