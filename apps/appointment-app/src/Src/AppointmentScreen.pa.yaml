                                      =If(
                                          !IsBlank(recordForAppointmentScreenAppointmentId),
                                          Remove(
                                              Appointments, LookUp(Appointments, ID = recordForAppointmentScreenAppointmentId)
                                          );,
                                          Remove(
                                              Appointments, selectedRecord
