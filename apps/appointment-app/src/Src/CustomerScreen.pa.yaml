                                            =ResetForm(Form1); UpdateContext({ newMode: false, editMode: false, CurrentItem: First(Table1.SelectedItems), isItemSelected:false });
                                          Text: ="Cancel"
                                    - SubmitButton1:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: ='ButtonCanvas.Appearance'.Primary
                                          DisplayMode: =If(editMode || newMode, DisplayMode.Edit, DisplayMode.View)
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |-
                                            =SubmitForm(Form1);
                                            With(
                                               {
                                                  _Low: 
                                                  Sort(
                                                     Customers,
                                                     ID
                                                  ),
                                                  _High: 
                                                  Sort(
                                                     Customers,
                                                     ID,
                                                     SortOrder.Descending
                                                  )
                                               },
                                               ClearCollect(
                                                  colCustomers,
                                                  _Low,
                                                  Filter(
                                                     _High,
                                                     !(ID in _Low.ID)
                                                  )
                                               )
                                            );
                                            UpdateContext({recordForCustomerScreenCustomerId: Blank()});
                                            ResetForm(Form1);
                                            Back();
                                          Text: ="Submit"
