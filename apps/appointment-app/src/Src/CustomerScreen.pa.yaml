                                          Icon: ="Add"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |-
                                            =If(!IsBlank(recordForCustomerScreenCustomerId),
                                            Navigate(
                                                AppointmentScreen, 
                                                ScreenTransition.Fade,
                                                {recordForAppointmentScreenCustomerId: recordForCustomerScreenCustomerId}
                                            ),
                                            Navigate(
                                                AppointmentScreen, 
                                                ScreenTransition.Fade,
                                                {recordForAppointmentScreenCustomerId: CurrentItem.ID}
                                            ))
                                          Text: ="Appointment"
                                          Width: =130
                                    - AddJobAddressButton:
                                        Control: Button@0.0.45
                                        Properties:
                                          DisplayMode: |-
                                            =If(!IsBlank(recordForCustomerScreenCustomerId) 
                                            || !IsBlank(selectedRecord)
                                            || isItemSelected, 
                                            DisplayMode.Edit, DisplayMode.View)
                                          Icon: ="Add"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |
                                            =If(!IsBlank(recordForCustomerScreenCustomerId),
                                            Navigate(
                                                AddressesScreen, 
                                                ScreenTransition.Fade,
                                                {recordForAddressesScreenCustomerId: recordForCustomerScreenCustomerId}
                                            ),
                                            Navigate(
