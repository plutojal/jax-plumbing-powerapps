                                        Properties:
                                          DisplayMode: =DisplayMode.View
                                          Height: =30
                                          Value: |-
                                            =With(
                                                {
                                                    customer: LookUp(colCustomers, ID = ThisItem.Customer.Id)
                                                },
                                                If(
                                                    !IsBlank(customer.Mobile),
                                                    customer.Mobile,
                                                    customer.Landline
                                                )
                                            )
                                          Width: '=titlePhone_1.Width - 10 '
                                          X: =textName_1.X + textName_1.Width + 10
                                    - textName_1:
                                        Control: TextInput@0.0.54
                                        Properties:
                                          DisplayMode: =DisplayMode.View
                                          Height: =30
                                          Value: |+
                                            =LookUp(colCustomers, ID = ThisItem.Customer.Id).'Full Name'

                                          Width: =titleName_1.Width - 10
                                          X: =buttonJobId_1.X + buttonJobId_1.Width + 10
                                    - buttonJobId_1:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: ='ButtonCanvas.Appearance'.Primary
                                          BasePaletteColor: =RGBA(5, 102, 178, 1)
                                          Height: =30
                                          OnSelect: |-
                                            =Navigate(
                                                AddressesScreen, 
                                                ScreenTransition.Fade,
                                                {recordID: ThisItem.ID}
                                            )
                                          Text: =ThisItem.ID
                                          Width: =50
