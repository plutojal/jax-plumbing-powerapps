Screens:
  CheckInScreen:
    Properties:
      Fill: =RGBA(245, 245, 245, 1)
      LoadingSpinnerColor: =RGBA(37, 99, 235, 1)
      OnVisible: |-
        =Set(varShowConfirm, false);
        Set(varRecord3, Blank())
    Children:
      - ScreenContainer_CheckIn:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =10
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer_CheckIn:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =50
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - NavBar_CheckIn:
                      Control: CanvasComponent
                      ComponentName: NavBar
                      Properties:
                        Company: |-
                          ={Name: "Jax Plumbing"}
                        Fill: =NavBar_CheckIn.Theme.Background
                        FillPortions: =1
                        Height: =50
                        Items: |-
                          =Table(
                              {Id: 1, Name: "Browse Assets", Screen: BrowseScreen},
                              {Id: 2, Name: "My Items", Screen: CheckInScreen}
                          )
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Theme: |-
                          ={
                              Background: ColorValue("White"),
                              BackgroundSelected: ColorValue("White"),
                              BackgroundHover: RGBA(37, 99, 235, 0.06),
                              Text: ColorValue("Gray"),
                              TextSelected: RGBA(37, 99, 235, 1)
                          }
                        Width: =App.Width
            - BodyContainer_CheckIn:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                Children:
                  - GalleryContainer_CheckIn:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =3
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =10
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                      Children:
                        - SectionHeader_CheckIn:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(255, 255, 255, 1)
                              FillPortions: =0
                              Height: =50
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              PaddingLeft: =16
                              PaddingRight: =16
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                            Children:
                              - SectionTitle_CheckIn:
                                  Control: Text@0.0.51
                                  Properties:
                                    FillPortions: =1
                                    Font: =Font.'Open Sans'
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Size: =14
                                    Text: ="Checked Out Assets"
                                    Weight: ='TextCanvas.Weight'.Semibold
                              - ItemCount_CheckIn:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ='TextCanvas.Align'.End
                                    Font: =Font.'Open Sans'
                                    FontColor: =RGBA(107, 114, 128, 1)
                                    FillPortions: =0
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Size: =12
                                    Text: =Text(CountRows(Filter('Asset Register', Status = "Checked Out"))) & " items"
                                    Width: =80
                        - CheckedOutGallery_CheckIn:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              Items: =Filter('Asset Register', Status = "Checked Out")
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              TemplatePadding: =8
                              TemplateSize: =90
                            Children:
                              - ItemContainer_CheckIn:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =If(varRecord3.ID = ThisItem.ID, RGBA(37, 99, 235, 0.08), RGBA(255, 255, 255, 1))
                                    Height: =Parent.TemplateHeight - 8
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =12
                                    PaddingBottom: =12
                                    PaddingLeft: =16
                                    PaddingRight: =16
                                    PaddingTop: =12
                                    RadiusBottomLeft: =8
                                    RadiusBottomRight: =8
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                    Width: =Parent.TemplateWidth
                                    OnSelect: |-
                                      =Set(varRecord3, ThisItem);
                                      Set(varShowConfirm, true)
                                  Children:
                                    - AssetId_CheckIn:
                                        Control: Text@0.0.51
                                        Properties:
                                          FillPortions: =0
                                          Font: =Font.'Open Sans'
                                          FontColor: =RGBA(37, 99, 235, 1)
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          Text: =ThisItem.Title
                                          Weight: ='TextCanvas.Weight'.Bold
                                          Width: =90
                                    - ItemDescContainer_CheckIn:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          FillPortions: =1
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =4
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                        Children:
                                          - ItemDesc_CheckIn:
                                              Control: Text@0.0.51
                                              Properties:
                                                Font: =Font.'Open Sans'
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                Text: =ThisItem.ItemDescription
                                                Weight: ='TextCanvas.Weight'.Semibold
                                          - CheckedOutDate_CheckIn:
                                              Control: Text@0.0.51
                                              Properties:
                                                Font: =Font.'Open Sans'
                                                FontColor: =RGBA(107, 114, 128, 1)
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                Size: =11
                                                Text: ="Checked out: " & Text(ThisItem.CheckedOutDate, "dd/mm/yyyy")
                                          - ReturnDate_CheckIn:
                                              Control: Text@0.0.51
                                              Properties:
                                                Font: =Font.'Open Sans'
                                                FontColor: =If(ThisItem.ExpectedReturnDate < Today(), RGBA(220, 38, 38, 1), RGBA(107, 114, 128, 1))
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                Size: =11
                                                Text: ="Due back: " & Text(ThisItem.ExpectedReturnDate, "dd/mm/yyyy")
                                    - ReturnBtn_CheckIn:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: ='ButtonCanvas.Appearance'.Primary
                                          BasePaletteColor: =RGBA(37, 99, 235, 1)
                                          FillPortions: =0
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |-
                                            =Set(varRecord3, ThisItem);
                                            Set(varShowConfirm, true)
                                          Text: ="Return"
                                          Width: =80
                  - ConfirmPanel_CheckIn:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =1
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        PaddingBottom: =24
                        PaddingLeft: =24
                        PaddingRight: =24
                        PaddingTop: =24
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Visible: =varShowConfirm
                      Children:
                        - ConfirmTitle_CheckIn:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Size: =16
                              Text: ="Confirm Return"
                              Weight: ='TextCanvas.Weight'.Bold
                        - ConfirmAssetId_CheckIn:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              FontColor: =RGBA(37, 99, 235, 1)
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Size: =14
                              Text: =varRecord3.Title
                              Weight: ='TextCanvas.Weight'.Semibold
                        - ConfirmDesc_CheckIn:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Text: =varRecord3.ItemDescription
                        - ConfirmMsg_CheckIn:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              FontColor: =RGBA(107, 114, 128, 1)
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Text: ="Are you sure you have returned this asset?"
                        - ConfirmReturnBtn_CheckIn:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Primary
                              BasePaletteColor: =RGBA(37, 99, 235, 1)
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnSelect: |-
                                =Patch('Asset Register', varRecord3, {Status: "Available", CheckedOutDate: Blank(), ExpectedReturnDate: Blank()});
                                Patch('Asset Log', Defaults('Asset Log'), {Title: varRecord3.Title & " - " & Text(Now(), "dd/mm/yyyy hh:mm"), AssetID: varRecord3.Title, Action: "Check In", DateTime: Now()});
                                Set(varShowConfirm, false);
                                Set(varRecord3, Blank())
                              Text: ="Confirm Return"
                        - ConfirmCancelBtn_CheckIn:
                            Control: Button@0.0.45
                            Properties:
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnSelect: |-
                                =Set(varShowConfirm, false);
                                Set(varRecord3, Blank())
                              Text: ="Cancel"
