Screens:
  BrowseScreen:
    Properties:
      Fill: =RGBA(245, 245, 245, 1)
      LoadingSpinnerColor: =RGBA(37, 99, 235, 1)
      OnVisible: |-
        =Set(varShowCheckout, false);
        Set(varRecord2, Blank())
    Children:
      - ScreenContainer_Browse:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =10
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer_Browse:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =50
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - NavBar_Browse:
                      Control: CanvasComponent
                      ComponentName: NavBar
                      Properties:
                        Company: |-
                          ={Name: "Jax Plumbing"}
                        Fill: =NavBar_Browse.Theme.Background
                        FillPortions: =1
                        Height: =50
                        Items: |-
                          =Table(
                              {Id: 1, Name: "Browse Assets", Screen: BrowseScreen},
                              {Id: 2, Name: "My Items", Screen: CheckInScreen}
                          )
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Theme: |-
                          ={
                              Background: ColorValue("White"),
                              BackgroundSelected: ColorValue("White"),
                              BackgroundHover: RGBA(37, 99, 235, 0.06),
                              Text: ColorValue("Gray"),
                              TextSelected: RGBA(37, 99, 235, 1)
                          }
                        Width: =App.Width
            - BodyContainer_Browse:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                Children:
                  - GalleryContainer_Browse:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =3
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =10
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                      Children:
                        - SearchBar_Browse:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(255, 255, 255, 1)
                              FillPortions: =0
                              Height: =50
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              PaddingLeft: =12
                              PaddingRight: =12
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                            Children:
                              - SearchInput_Browse:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    FillPortions: =1
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Placeholder: ="Search by ID or description..."
                                    TriggerOutput: ='TextInputCanvas.TriggerOutput'.Keypress
                              - CategoryFilter_Browse:
                                  Control: DropDown@0.0.45
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    Items: =["All", "Office", "Yard", "Van", "Engineer Owned"]
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Width: =180
                        - AssetGallery_Browse:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              Items: |-
                                =Filter(
                                    'Asset Register',
                                    IsActive = true,
                                    IsBlank(SearchInput_Browse.Value) || Title in SearchInput_Browse.Value || ItemDescription in SearchInput_Browse.Value,
                                    CategoryFilter_Browse.Selected.Value = "All" || IsBlank(CategoryFilter_Browse.Selected.Value) || AssetCategory = CategoryFilter_Browse.Selected.Value
                                )
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              TemplatePadding: =8
                              TemplateSize: =80
                            Children:
                              - ItemContainer_Browse:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =If(varRecord2.ID = ThisItem.ID, RGBA(37, 99, 235, 0.08), RGBA(255, 255, 255, 1))
                                    Height: =Parent.TemplateHeight - 8
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =12
                                    PaddingBottom: =12
                                    PaddingLeft: =16
                                    PaddingRight: =16
                                    PaddingTop: =12
                                    RadiusBottomLeft: =8
                                    RadiusBottomRight: =8
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                    Width: =Parent.TemplateWidth
                                    OnSelect: |-
                                      =Set(varRecord2, ThisItem);
                                      Set(varShowCheckout, true)
                                  Children:
                                    - AssetId_Browse:
                                        Control: Text@0.0.51
                                        Properties:
                                          FillPortions: =0
                                          Font: =Font.'Open Sans'
                                          FontColor: =RGBA(37, 99, 235, 1)
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          Text: =ThisItem.Title
                                          Weight: ='TextCanvas.Weight'.Bold
                                          Width: =90
                                    - DescContainer_Browse:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          FillPortions: =1
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =4
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                        Children:
                                          - Desc_Browse:
                                              Control: Text@0.0.51
                                              Properties:
                                                Font: =Font.'Open Sans'
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                Text: =ThisItem.ItemDescription
                                                Weight: ='TextCanvas.Weight'.Semibold
                                          - Category_Browse:
                                              Control: Text@0.0.51
                                              Properties:
                                                Font: =Font.'Open Sans'
                                                FontColor: =RGBA(107, 114, 128, 1)
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                Size: =11
                                                Text: =ThisItem.AssetCategory & " · " & ThisItem.Location
                                    - StatusBadge_Browse:
                                        Control: Text@0.0.51
                                        Properties:
                                          Align: ='TextCanvas.Align'.Center
                                          Fill: |-
                                            =If(ThisItem.Status = "Available",
                                                RGBA(34, 197, 94, 0.15),
                                                If(ThisItem.Status = "Checked Out",
                                                    RGBA(249, 115, 22, 0.15),
                                                    RGBA(229, 231, 235, 1)
                                                )
                                            )
                                          FontColor: |-
                                            =If(ThisItem.Status = "Available",
                                                RGBA(21, 128, 61, 1),
                                                If(ThisItem.Status = "Checked Out",
                                                    RGBA(194, 65, 12, 1),
                                                    RGBA(75, 85, 99, 1)
                                                )
                                            )
                                          FillPortions: =0
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          PaddingBottom: =4
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          PaddingTop: =4
                                          RadiusBottomLeft: =12
                                          RadiusBottomRight: =12
                                          RadiusTopLeft: =12
                                          RadiusTopRight: =12
                                          Text: =ThisItem.Status
                                          Width: =110
                  - CheckoutPanel_Browse:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =1
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        PaddingBottom: =24
                        PaddingLeft: =24
                        PaddingRight: =24
                        PaddingTop: =24
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Visible: =varShowCheckout
                      Children:
                        - PanelTitle_Browse:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Size: =16
                              Text: ="Check Out Asset"
                              Weight: ='TextCanvas.Weight'.Bold
                        - PanelAssetId_Browse:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              FontColor: =RGBA(37, 99, 235, 1)
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Size: =14
                              Text: =varRecord2.Title
                              Weight: ='TextCanvas.Weight'.Semibold
                        - PanelDesc_Browse:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Text: =varRecord2.ItemDescription
                        - PanelMakeModel_Browse:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              FontColor: =RGBA(107, 114, 128, 1)
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Text: =varRecord2.Make & " " & varRecord2.Model
                        - PanelStatus_Browse:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              FontColor: |-
                                =If(varRecord2.Status = "Available",
                                    RGBA(21, 128, 61, 1),
                                    RGBA(194, 65, 12, 1)
                                )
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Text: ="Status: " & varRecord2.Status
                        - PanelReturnLabel_Browse:
                            Control: Text@0.0.51
                            Properties:
                              Font: =Font.'Open Sans'
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Text: ="Expected Return Date"
                              Weight: ='TextCanvas.Weight'.Semibold
                        - ReturnDatePicker_Browse:
                            Control: DatePicker@0.0.46
                            Properties:
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                        - CheckoutButton_Browse:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Primary
                              BasePaletteColor: =RGBA(37, 99, 235, 1)
                              DisplayMode: =If(varRecord2.Status = "Available", DisplayMode.Edit, DisplayMode.Disabled)
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnSelect: |-
                                =Set(varShowSpinner, true);
                                Patch('Asset Register', varRecord2, {Status: "Checked Out", CheckedOutDate: Now(), ExpectedReturnDate: ReturnDatePicker_Browse.SelectedDate});
                                Patch('Asset Log', Defaults('Asset Log'), {Title: varRecord2.Title & " - " & Text(Now(), "dd/mm/yyyy hh:mm"), AssetID: varRecord2.Title, Action: "Check Out", DateTime: Now(), ExpectedReturnDate: ReturnDatePicker_Browse.SelectedDate});
                                Set(varShowCheckout, false);
                                Set(varRecord2, Blank());
                                Set(varShowSpinner, false)
                              Text: ="Check Out"
                        - CancelButton_Browse:
                            Control: Button@0.0.45
                            Properties:
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnSelect: |-
                                =Set(varShowCheckout, false);
                                Set(varRecord2, Blank())
                              Text: ="Cancel"
