Screens:
  scrAssetDetail:
    Properties:
      Fill: =RGBA(245, 247, 250, 1)
      LoadingSpinnerColor: =RGBA(37, 99, 235, 1)
    Children:
      - conDetailHeader:
          Control: GroupContainer@1.5.0
          Properties:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =52
            Fill: =RGBA(37, 99, 235, 1)
          Children:
            - btnDetailBack:
                Control: Button@0.0.44
                Properties:
                  X: =0
                  Y: =0
                  Width: =52
                  Height: =52
                  Text: ="‹"
                  Fill: =RGBA(0, 0, 0, 0)
                  Color: =RGBA(255, 255, 255, 1)
                  Size: =22
                  BorderColor: =RGBA(0, 0, 0, 0)
                  OnSelect: =Navigate(scrHome, ScreenTransition.Fade)

            - lblDetailTitle:
                Control: Label@2.5.1
                Properties:
                  X: =52
                  Y: =0
                  Width: =Parent.Width - 52
                  Height: =52
                  Text: =gblSelectedAsset.Title
                  Size: =17
                  FontWeight: =FontWeight.Bold
                  Color: =RGBA(255, 255, 255, 1)
                  VerticalAlign: =VerticalAlign.Middle

      - conDetailBody:
          Control: GroupContainer@1.5.0
          Properties:
            X: =0
            Y: =52
            Width: =Parent.Width
            Height: =Parent.Height - 52 - 120
            Fill: =RGBA(245, 247, 250, 1)
          Children:
            - conDetailCard:
                Control: GroupContainer@1.5.0
                Properties:
                  X: =12
                  Y: =12
                  Width: =Parent.Width - 24
                  Height: =380
                  Fill: =RGBA(255, 255, 255, 1)
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  DropShadow: =DropShadow.Light
                Children:
                  - lblStatusBadge:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =12
                        Width: =120
                        Height: =28
                        Text: =gblSelectedAsset.Status.Value
                        Size: =12
                        FontWeight: =FontWeight.Semibold
                        Align: =Align.Center
                        VerticalAlign: =VerticalAlign.Middle
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        Color: |-
                          =Switch(gblSelectedAsset.Status.Value,
                              "Available", RGBA(22, 101, 52, 1),
                              "Checked Out", RGBA(146, 64, 14, 1),
                              "Under Repair", RGBA(153, 27, 27, 1),
                              RGBA(75, 85, 99, 1)
                          )
                        Fill: |-
                          =Switch(gblSelectedAsset.Status.Value,
                              "Available", RGBA(220, 252, 231, 1),
                              "Checked Out", RGBA(254, 243, 199, 1),
                              "Under Repair", RGBA(254, 226, 226, 1),
                              RGBA(229, 231, 235, 1)
                          )

                  - lblCategoryBadge:
                      Control: Label@2.5.1
                      Properties:
                        X: =144
                        Y: =12
                        Width: =160
                        Height: =28
                        Text: =gblSelectedAsset.AssetCategory.Value
                        Size: =11
                        Align: =Align.Center
                        VerticalAlign: =VerticalAlign.Middle
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        Color: =RGBA(55, 65, 81, 1)
                        Fill: =RGBA(229, 231, 235, 1)

                  - lblDescLabel:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =52
                        Width: =120
                        Height: =20
                        Text: ="Description"
                        Size: =11
                        Color: =RGBA(107, 114, 128, 1)

                  - lblDescValue:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =70
                        Width: =Parent.Width - 32
                        Height: =20
                        Text: =gblSelectedAsset.ItemDescription
                        Size: =13
                        FontWeight: =FontWeight.Semibold
                        Color: =RGBA(17, 24, 39, 1)

                  - lblMakeLabel:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =100
                        Width: =150
                        Height: =20
                        Text: ="Make / Model"
                        Size: =11
                        Color: =RGBA(107, 114, 128, 1)

                  - lblMakeValue:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =118
                        Width: =Parent.Width - 32
                        Height: =20
                        Text: =gblSelectedAsset.Make & " " & gblSelectedAsset.Model
                        Size: =13
                        Color: =RGBA(17, 24, 39, 1)

                  - lblLocationLabel:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =148
                        Width: =150
                        Height: =20
                        Text: ="Location"
                        Size: =11
                        Color: =RGBA(107, 114, 128, 1)

                  - lblLocationValue:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =166
                        Width: =Parent.Width - 32
                        Height: =20
                        Text: =gblSelectedAsset.Location
                        Size: =13
                        Color: =RGBA(17, 24, 39, 1)

                  - lblSerialLabel:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =196
                        Width: =150
                        Height: =20
                        Text: ="Serial Number"
                        Size: =11
                        Color: =RGBA(107, 114, 128, 1)

                  - lblSerialValue:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =214
                        Width: =Parent.Width - 32
                        Height: =20
                        Text: =gblSelectedAsset.SerialNumber
                        Size: =13
                        Color: =RGBA(17, 24, 39, 1)

                  - lblAssignedLabel:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =244
                        Width: =150
                        Height: =20
                        Text: ="Checked Out To"
                        Size: =11
                        Color: =RGBA(107, 114, 128, 1)
                        Visible: =gblSelectedAsset.Status.Value = "Checked Out"

                  - lblAssignedValue:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =262
                        Width: =Parent.Width - 32
                        Height: =20
                        Text: =gblSelectedAsset.CurrentAssignedTo.DisplayName
                        Size: =13
                        Color: =RGBA(17, 24, 39, 1)
                        Visible: =gblSelectedAsset.Status.Value = "Checked Out"

                  - lblReturnLabel:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =292
                        Width: =150
                        Height: =20
                        Text: ="Expected Return"
                        Size: =11
                        Color: =RGBA(107, 114, 128, 1)
                        Visible: =gblSelectedAsset.Status.Value = "Checked Out"

                  - lblReturnValue:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =310
                        Width: =Parent.Width - 32
                        Height: =20
                        Text: =Text(gblSelectedAsset.ExpectedReturnDate, "dd/mm/yyyy")
                        Size: =13
                        Color: |-
                          =If(
                              gblSelectedAsset.ExpectedReturnDate < Now(),
                              RGBA(153, 27, 27, 1),
                              RGBA(17, 24, 39, 1)
                          )
                        Visible: =gblSelectedAsset.Status.Value = "Checked Out"

                  - lblNotesLabel:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =340
                        Width: =150
                        Height: =20
                        Text: ="Notes"
                        Size: =11
                        Color: =RGBA(107, 114, 128, 1)

                  - lblNotesValue:
                      Control: Label@2.5.1
                      Properties:
                        X: =16
                        Y: =358
                        Width: =Parent.Width - 32
                        Height: =20
                        Text: =gblSelectedAsset.Notes
                        Size: =12
                        Color: =RGBA(55, 65, 81, 1)

      - conDetailActions:
          Control: GroupContainer@1.5.0
          Properties:
            X: =0
            Y: =Parent.Height - 120
            Width: =Parent.Width
            Height: =120
            Fill: =RGBA(255, 255, 255, 1)
          Children:
            - btnCheckOut:
                Control: Button@0.0.44
                Properties:
                  X: =12
                  Y: =16
                  Width: =Parent.Width - 24
                  Height: =44
                  Text: ="Check Out"
                  Fill: =RGBA(37, 99, 235, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  FontWeight: =FontWeight.Bold
                  Size: =15
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Visible: =gblSelectedAsset.Status.Value = "Available"
                  OnSelect: =Navigate(scrCheckOut, ScreenTransition.Cover)

            - btnCheckIn:
                Control: Button@0.0.44
                Properties:
                  X: =12
                  Y: =16
                  Width: =Parent.Width - 24
                  Height: =44
                  Text: ="Check In"
                  Fill: =RGBA(5, 150, 105, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  FontWeight: =FontWeight.Bold
                  Size: =15
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Visible: =gblSelectedAsset.Status.Value = "Checked Out"
                  OnSelect: =Navigate(scrCheckIn, ScreenTransition.Cover)

            - btnMarkRepair:
                Control: Button@0.0.44
                Properties:
                  X: =12
                  Y: =16
                  Width: =Parent.Width - 24
                  Height: =44
                  Text: ="Mark as Under Repair"
                  Fill: =RGBA(220, 38, 38, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  FontWeight: =FontWeight.Bold
                  Size: =15
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Visible: =gblSelectedAsset.Status.Value = "Available"
                  Y: =70
                  OnSelect: |-
                    =Patch(
                        'Shared Equipment',
                        gblSelectedAsset,
                        {Status: {Value: "Under Repair"}}
                    );
                    Patch(
                        'Equipment List Log',
                        Defaults('Equipment List Log'),
                        {
                            Title: gblSelectedAsset.Title & " – " & Text(Now(), "dd/mm/yyyy hh:mm"),
                            AssetID: {Id: gblSelectedAsset.ID, Value: gblSelectedAsset.Title},
                            Action: {Value: "Under Repair"},
                            StaffMember: {
                                '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                Claims: "i:0#.f|membership|" & gblCurrentUser.Email,
                                DisplayName: gblCurrentUser.FullName,
                                Email: gblCurrentUser.Email
                            },
                            ActionDateTime: Now(),
                            Condition: {Value: "Good"}
                        }
                    );
                    Set(gblSelectedAsset, LookUp('Shared Equipment', ID = gblSelectedAsset.ID));
                    ClearCollect(colSharedEquipment, Filter('Shared Equipment', IsActive = true));

            - btnReturnRepair:
                Control: Button@0.0.44
                Properties:
                  X: =12
                  Y: =16
                  Width: =Parent.Width - 24
                  Height: =44
                  Text: ="Returned from Repair"
                  Fill: =RGBA(5, 150, 105, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  FontWeight: =FontWeight.Bold
                  Size: =15
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Visible: =gblSelectedAsset.Status.Value = "Under Repair"
                  OnSelect: |-
                    =Patch(
                        'Shared Equipment',
                        gblSelectedAsset,
                        {Status: {Value: "Available"}}
                    );
                    Patch(
                        'Equipment List Log',
                        Defaults('Equipment List Log'),
                        {
                            Title: gblSelectedAsset.Title & " – " & Text(Now(), "dd/mm/yyyy hh:mm"),
                            AssetID: {Id: gblSelectedAsset.ID, Value: gblSelectedAsset.Title},
                            Action: {Value: "Returned from Repair"},
                            StaffMember: {
                                '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                Claims: "i:0#.f|membership|" & gblCurrentUser.Email,
                                DisplayName: gblCurrentUser.FullName,
                                Email: gblCurrentUser.Email
                            },
                            ActionDateTime: Now(),
                            Condition: {Value: "Good"}
                        }
                    );
                    Set(gblSelectedAsset, LookUp('Shared Equipment', ID = gblSelectedAsset.ID));
                    ClearCollect(colSharedEquipment, Filter('Shared Equipment', IsActive = true));
